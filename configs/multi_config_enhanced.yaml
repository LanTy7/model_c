# Enhanced Multi-class Classification Config
# With Self-Attention, CNN, and AECR regularization

model:
  input_size: 21               # One-hot encoding dimension
  hidden_size: 256
  num_layers: 3
  dropout: 0.4
  num_classes: 14

  # New features
  use_attention: true
  num_attention_heads: 8       # 256*2=512, 512/8=64 per head
  attention_dropout: 0.1

  use_cnn: true
  cnn_out_channels: 64
  cnn_kernel_sizes: [3, 5, 7]

training:
  epochs: 150
  batch_size: 256
  lr: 0.001
  weight_decay: 0.02
  patience: 20
  grad_clip: 1.0
  warmup_epochs: 5
  use_amp: true

  # AECR regularization
  use_aecr: true
  lambda_aecr: 0.1
  aecr_sigma: 3.0
  aecr_lambda_ent: 1.0
  aecr_lambda_loc: 0.5

focal_loss:
  gamma: 1.0
  label_smoothing: 0.1

data:
  train_csv: 'data_now/train.csv'
  val_csv: 'data_now/val.csv'
  test_csv: 'data_now/test.csv'
  min_samples: 40              # Merge rare categories

paths:
  save_dir: "./checkpoints/multi"
  log_dir: "./logs/multi"
  fig_dir: "./figures/multi"

device: "cuda"
seed: 42

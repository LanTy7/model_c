# Enhanced Binary Classification Config
# With Self-Attention, CNN, and AECR regularization

model:
  vocab_size: 22
  embedding_dim: 128
  hidden_size: 128
  num_layers: 2
  dropout: 0.4
  max_length: 1000

  # New features
  use_attention: true          # Enable Self-Attention
  num_attention_heads: 4       # Attention heads (must divide hidden_size*2)
  attention_dropout: 0.1

  use_cnn: true                # Enable Multi-scale CNN
  cnn_out_channels: 64         # Channels per kernel
  cnn_kernel_sizes: [3, 5, 7]  # Multi-scale kernels

training:
  epochs: 100
  batch_size: 128              # Reduced from 256 for CNN memory
  lr: 0.0005
  weight_decay: 0.02
  patience: 15
  grad_clip: 1.0
  warmup_epochs: 5
  use_amp: true

  # AECR regularization
  use_aecr: true               # Enable AECR loss
  lambda_aecr: 0.1             # AECR weight
  aecr_sigma: 3.0              # Gaussian kernel sigma
  aecr_lambda_ent: 1.0         # Entropy weight
  aecr_lambda_loc: 0.5         # Local continuity weight

data:
  train_csv: 'data_now/train.csv'
  val_csv: 'data_now/val.csv'
  max_length: 1000

# Binary Classification Configuration
# Default config includes Self-Attention, Multi-scale CNN, and AECR regularization

model:
  name: "BinaryARGClassifier"
  vocab_size: 25
  embedding_dim: 128
  hidden_size: 128
  num_layers: 2
  dropout: 0.5
  max_length: 700
  num_attention_heads: 4
  attention_dropout: 0.1
  cnn_out_channels: 64
  cnn_kernel_sizes: [3, 5, 7]

training:
  epochs: 100
  batch_size: 256
  lr: 0.002
  weight_decay: 0.05
  patience: 25
  grad_clip: 1.0
  warmup_epochs: 8
  use_amp: true
  accumulation_steps: 2
  num_workers: 8
  label_smoothing: 0.1

  # Loss function: Focal Loss (recommended for extreme imbalance)
  # BalancedRandomSampler already balances batches; keep alpha neutral (0.5)
  # to avoid stacking class weighting on top of balanced sampling.
  use_focal_loss: true
  focal_alpha: 0.5
  focal_gamma: 1.0

  # Class imbalance handling
  # pos_weight is kept at 1.0 because WeightedRandomSampler already
  # ensures balanced batches; no further loss-level reweighting needed.
  pos_weight: 1.0

  # AECR regularization (disabled by default — conflicts with sparse protein features)
  lambda_aecr: 0.0
  aecr_sigma: 3.0
  aecr_lambda_ent: 1.0
  aecr_lambda_loc: 0.0

data:
  # K-fold cross-validation mode (deprecated, kept for backward compatibility)
  # Set use_kfold: false to use single train/val/test split
  use_kfold: false
  data_dir: "data"
  n_splits: 5

  # Single-split mode (fallback, used when use_kfold: false)
  train_csv: "data/train.csv"
  val_csv: "data/val.csv"
  test_csv: "data/test.csv"

paths:
  save_dir: "./checkpoints/binary"
  log_dir: "./logs/binary"
  fig_dir: "./figures/binary"

device: "cuda"
seed: 42

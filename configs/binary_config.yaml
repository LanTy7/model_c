# Binary Classification Configuration

model:
  name: "BinaryARGClassifier"
  vocab_size: 22
  embedding_dim: 128
  hidden_size: 128
  num_layers: 2
  dropout: 0.5            
  max_length: 1000

training:
  epochs: 100
  batch_size: 256
  lr: 0.0003              
  weight_decay: 0.02      
  patience: 10           
  grad_clip: 1.0
  warmup_epochs: 5
  use_amp: true
  accumulation_steps: 1
  num_workers: 4

  # Class imbalance handling
  # pos_weight: null means auto-calculate from data (n_neg / n_pos)
  # Set to a value > 1 to emphasize positive class (e.g., 10.0 for 10:1 emphasis)
  pos_weight: null        # Options: null (auto), or float value (e.g., 10.0)

data:
  train_csv: "data_now/train.csv"
  val_csv: "data_now/val.csv"
  test_csv: "data_now/test.csv"
  pos_neg_ratio: 1

paths:
  save_dir: "./checkpoints/binary"
  log_dir: "./logs/binary"
  fig_dir: "./figures/binary"

# Visualization settings
visualization:
  enabled: true
  format: "png"
  plots:
    - training_curves
    - confusion_matrix
    - per_class_metrics
    - roc_curves

# Evaluation settings
evaluation:
  compute_per_class: true
  save_predictions: true
  save_history: true

device: "cuda"
seed: 42

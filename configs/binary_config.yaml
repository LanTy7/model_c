# Binary Classification Configuration
# Default config includes Self-Attention, Multi-scale CNN, and AECR regularization

model:
  name: "BinaryARGClassifier"
  vocab_size: 25
  embedding_dim: 128
  hidden_size: 256
  num_layers: 3
  dropout: 0.5
  max_length: 700
  num_attention_heads: 8
  attention_dropout: 0.1
  cnn_out_channels: 64
  cnn_kernel_sizes: [3, 5, 7]

training:
  epochs: 100
  batch_size: 128
  lr: 0.002
  weight_decay: 0.02
  patience: 15
  grad_clip: 1.0
  warmup_epochs: 5
  use_amp: true
  accumulation_steps: 4
  num_workers: 8
  label_smoothing: 0.1

  # Class imbalance handling
  # pos_weight: null means auto-calculate from data (n_neg / n_pos)
  pos_weight: 15

  # AECR regularization (enabled by default)
  lambda_aecr: 0.001
  aecr_sigma: 3.0
  aecr_lambda_ent: 1.0
  aecr_lambda_loc: 0.0

data:
  # K-fold cross-validation mode (two-stage homology-aware splitting)
  # Set use_kfold: true to train on fold_0/ .. fold_4/ splits
  use_kfold: true
  data_dir: "data"
  n_splits: 5

  # Single-split mode (fallback, used when use_kfold: false)
  train_csv: "data/train.csv"
  val_csv: "data/val.csv"
  test_csv: "data/test.csv"

paths:
  save_dir: "./checkpoints/binary"
  log_dir: "./logs/binary"
  fig_dir: "./figures/binary"

device: "cuda"
seed: 42

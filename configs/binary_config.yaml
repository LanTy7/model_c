# Binary Classification Configuration
# Default config includes Self-Attention, Multi-scale CNN, and AECR regularization

model:
  name: "BinaryARGClassifier"
  vocab_size: 22
  embedding_dim: 128
  hidden_size: 128
  num_layers: 2
  dropout: 0.4
  max_length: 1000
  num_attention_heads: 4
  attention_dropout: 0.1
  cnn_out_channels: 64
  cnn_kernel_sizes: [3, 5, 7]

training:
  epochs: 100
  batch_size: 256
  lr: 0.0005
  weight_decay: 0.02
  patience: 15
  grad_clip: 1.0
  warmup_epochs: 5
  use_amp: true
  accumulation_steps: 1
  num_workers: 4

  # Class imbalance handling
  # pos_weight: null means auto-calculate from data (n_neg / n_pos)
  pos_weight: null

  # AECR regularization (enabled by default)
  lambda_aecr: 0.1
  aecr_sigma: 3.0
  aecr_lambda_ent: 1.0
  aecr_lambda_loc: 0.5

data:
  train_csv: "data/train.csv"
  val_csv: "data/val.csv"
  test_csv: "data/test.csv"
  pos_neg_ratio: 1

paths:
  save_dir: "./checkpoints/binary"
  log_dir: "./logs/binary"
  fig_dir: "./figures/binary"

# Visualization settings
visualization:
  enabled: true
  format: "png"
  plots:
    - training_curves
    - confusion_matrix
    - per_class_metrics
    - roc_curves

# Evaluation settings
evaluation:
  compute_per_class: true
  save_predictions: true
  save_history: true

device: "cuda"
seed: 42
